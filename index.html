```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Digital Twin Earthquake Simulator</title>

<style>

body{
    margin:0;
    background:#eef2f7;
    font-family:Arial,sans-serif;
}

header{
    background:#1e293b;
    color:white;
    text-align:center;
    padding:20px;
}

.controls{
    text-align:center;
    margin:20px;
}

.city{
    display:flex;
    justify-content:center;
    gap:90px;
    margin-top:40px;
    flex-wrap:wrap;
}

.model{
    text-align:center;
}

.building{
    width:120px;
    height:260px;
    background:#60a5fa;
    position:relative;
    transform-origin:bottom center;
}

.ground{
    width:150px;
    height:18px;
    background:#444;
    margin:auto;
}

.label{
    margin-top:10px;
    font-weight:bold;
}

/* 층 */

.floor{
    position:absolute;
    width:100%;
    height:2px;
    background:rgba(255,255,255,.4);
}

.f1{top:50px;}
.f2{top:100px;}
.f3{top:150px;}
.f4{top:200px;}

/* 내진 X자 */

.brace{
    position:absolute;
    width:100%;
    height:52px;
}

.brace::before,
.brace::after{
    content:"";
    position:absolute;
    width:135px;
    height:3px;
    background:white;
    left:-7px;
    top:24px;
}

.brace::before{
    transform:rotate(25deg);
}

.brace::after{
    transform:rotate(-25deg);
}

.b1{top:0;}
.b2{top:52px;}
.b3{top:104px;}
.b4{top:156px;}
.b5{top:208px;}

/* 제진 추 */

.cable{
    position:absolute;
    width:2px;
    height:55px;
    background:black;
    left:59px;
}

.weight{
    width:26px;
    height:26px;
    border-radius:50%;
    background:#ef4444;
    position:absolute;
    left:47px;
    top:50px;
}

/* 면진 베어링 */

.isolator{
    width:120px;
    display:flex;
    justify-content:space-around;
    margin:auto;
}

.ball{
    width:18px;
    height:18px;
    border-radius:50%;
    background:#f59e0b;
}

/* 디지털 트윈 */

.panel{
    width:700px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

.flow{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.step{
    background:#dbeafe;
    padding:10px;
    border-radius:8px;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>🏢 Digital Twin Earthquake Simulator</h1>
<p>동일한 지진에서 내진 · 제진 · 면진 구조 비교</p>
</header>

<div class="controls">

진도 :

<input
type="range"
id="intensity"
min="1"
max="10"
value="5">

<span id="value">5</span>

<button onclick="earthquake()">
지진 발생
</button>

</div>

<div class="city">

<!-- 내진 -->

<div class="model">

<div class="building" id="naejin">

<div class="brace b1"></div>
<div class="brace b2"></div>
<div class="brace b3"></div>
<div class="brace b4"></div>
<div class="brace b5"></div>

<div class="floor f1"></div>
<div class="floor f2"></div>
<div class="floor f3"></div>
<div class="floor f4"></div>

</div>

<div class="ground"></div>

<div class="label">
내진 구조 (X 가새)
</div>

</div>

<!-- 제진 -->

<div class="model">

<div class="building" id="jejin">

<div class="cable"></div>

<div class="weight"
id="weight"></div>

<div class="floor f1"></div>
<div class="floor f2"></div>
<div class="floor f3"></div>
<div class="floor f4"></div>

</div>

<div class="ground"></div>

<div class="label">
제진 구조 (TMD)
</div>

</div>

<!-- 면진 -->

<div class="model">

<div class="building"
id="myeonjin">

<div class="floor f1"></div>
<div class="floor f2"></div>
<div class="floor f3"></div>
<div class="floor f4"></div>

</div>

<div class="isolator"
id="isolator">

<div class="ball"></div>
<div class="ball"></div>
<div class="ball"></div>
<div class="ball"></div>

</div>

<div class="ground"></div>

<div class="label">
면진 구조 (베어링)
</div>

</div>

</div>

<div class="panel">

<h2>Digital Twin</h2>

<div class="flow">

<div class="step">실제 건물</div>
<div class="step">센서 데이터</div>
<div class="step">디지털 트윈</div>
<div class="step">지진 시뮬레이션</div>
<div class="step">피해 예측</div>

</div>

</div>

<script>

const slider =
document.getElementById("intensity");

slider.oninput = () => {
document.getElementById("value").textContent =
slider.value;
};

function earthquake(){

const power =
Number(slider.value);

const naejin =
document.getElementById("naejin");

const jejin =
document.getElementById("jejin");

const myeonjin =
document.getElementById("myeonjin");

const weight =
document.getElementById("weight");

const isolator =
document.getElementById("isolator");

let frame = 0;

const timer = setInterval(()=>{

frame++;

const wave =
Math.sin(frame * 0.25);

/* 내진 : 가장 많이 흔들림 */

naejin.style.transform =
`rotate(${wave*power*2.0}deg)`;

/* 제진 : 중간 */

jejin.style.transform =
`rotate(${wave*power*0.9}deg)`;

/* 제진추 */

weight.style.transform =
`translateX(${-wave*power*10}px)`;

/* 면진 : 거의 안 흔들림 */

myeonjin.style.transform =
`rotate(${wave*power*0.2}deg)`;

/* 베어링은 크게 이동 */

isolator.style.transform =
`translateX(${wave*power*12}px)`;

if(frame > 220){

clearInterval(timer);

naejin.style.transform="";
jejin.style.transform="";
myeonjin.style.transform="";
weight.style.transform="";
isolator.style.transform="";
}

},25);

}

</script>

</body>
</html>
```
