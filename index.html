```javascript id="l6q6hs"

const slider =
document.getElementById("power");

const value =
document.getElementById("value");

const startBtn =
document.getElementById("startBtn");

const liveData =
document.getElementById("liveData");

const naejin =
document.getElementById("naejin");

const jejin =
document.getElementById("jejin");

const myeonjin =
document.getElementById("myeonjin");

const weight =
document.getElementById("weight");

const rope =
document.getElementById("rope");

const isolator =
document.getElementById("isolator");

value.textContent = slider.value;

slider.addEventListener("input",()=>{

    value.textContent =
    slider.value;

});

let running = false;

startBtn.addEventListener("click",()=>{

    if(running) return;

    running = true;

    runEarthquake();

});

function runEarthquake(){

    let frame = 0;

    const intensity =
    Number(slider.value);

    let spillN = 0;
    let spillJ = 0;
    let spillM = 0;

    const duration = 720;

    const timer =
    setInterval(()=>{

        frame++;

        /*
        실제 실험
        약 2Hz
        */

        const t =
        frame / 60;

        const wave =
        Math.sin(
        t * Math.PI * 4
        );

        /* 내진 */

        const moveN =
        wave *
        intensity *
        12;

        naejin.setAttribute(
        "transform",
        `translate(${moveN},0)`
        );

        /* 제진 */

        const moveJ =
        wave *
        intensity *
        7;

        jejin.setAttribute(
        "transform",
        `translate(${moveJ},0)`
        );

        /* 제진추 */

        const pendulum =
        Math.sin(
        t * Math.PI * 3.5
        )
        *
        intensity
        *
        12;

        weight.setAttribute(
        "cx",
        120 - pendulum
        );

        rope.setAttribute(
        "x2",
        120 - pendulum
        );

        /* 면진 */

        const moveM =
        wave *
        intensity *
        2;

        myeonjin.setAttribute(
        "transform",
        `translate(${moveM},0)`
        );

        const bearing =
        wave *
        intensity *
        15;

        isolator.setAttribute(
        "transform",
        `translate(${bearing},0)`
        );

        /* 유출량 계산 */

        spillN +=
        Math.abs(moveN)
        *
        0.010;

        spillJ +=
        Math.abs(moveJ)
        *
        0.008;

        spillM +=
        Math.abs(moveM)
        *
        0.003;

        liveData.innerHTML =

        `
        현재 물 유출량

        <br><br>

        내진 :
        ${spillN.toFixed(1)} g

        <br>

        제진 :
        ${spillJ.toFixed(1)} g

        <br>

        면진 :
        ${spillM.toFixed(1)} g
        `;

        if(frame > duration){

            clearInterval(timer);

            finishSimulation();

        }

    },16);

}

function finishSimulation(){

    naejin.removeAttribute(
    "transform"
    );

    jejin.removeAttribute(
    "transform"
    );

    myeonjin.removeAttribute(
    "transform"
    );

    isolator.removeAttribute(
    "transform"
    );

    weight.setAttribute(
    "cx",
    120
    );

    rope.setAttribute(
    "x2",
    120
    );

    liveData.innerHTML =

    `
    <h3>
    실험 종료
    </h3>

    <br>

    실제 측정 결과

    <br><br>

    🔴 내진 : 28.2 g

    <br>

    🟠 제진 : 19.7 g

    <br>

    🟢 면진 : 5.0 g

    <br><br>

    가장 적은 물이
    유출된 구조는
    <b>면진 구조</b>입니다.
    `;

    running = false;

}

</script>

</body>
