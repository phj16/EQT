```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디지털 트윈 지진 시뮬레이터</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Malgun Gothic",sans-serif;
    background:#eef2f7;
    text-align:center;
}

header{
    background:#1f2937;
    color:white;
    padding:20px;
}

header h1{
    margin-bottom:8px;
}

.subtitle{
    color:#d1d5db;
}

.panel{
    background:white;
    width:90%;
    max-width:1100px;
    margin:20px auto;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.controls{
    margin:20px;
}

button{
    padding:10px 20px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:8px;
    cursor:pointer;
    margin-left:10px;
}

button:hover{
    background:#1d4ed8;
}

.buildings{
    display:flex;
    justify-content:center;
    gap:80px;
    margin-top:40px;
    flex-wrap:wrap;
}

.structure{
    width:180px;
}

.building{
    width:80px;
    height:220px;
    margin:auto;
    border-radius:6px 6px 0 0;
    transform-origin:bottom center;
}

.naejin{
    background:#ef4444;
}

.jejin{
    background:#f59e0b;
}

.myeonjin{
    background:#10b981;
}

.base{
    width:120px;
    height:18px;
    background:#444;
    margin:auto;
}

.name{
    margin-top:10px;
    font-weight:bold;
}

.status{
    margin-top:6px;
    color:#555;
    font-size:14px;
}

.twin-box{
    margin-top:30px;
    border:2px dashed #3b82f6;
    padding:15px;
    border-radius:10px;
    background:#f8fbff;
}

.flow{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    margin-top:15px;
}

.step{
    background:white;
    border:1px solid #ccc;
    padding:10px;
    border-radius:8px;
    min-width:120px;
}

footer{
    margin:30px;
    color:#666;
}

</style>
</head>
<body>

<header>
    <h1>🏢 디지털 트윈 지진 시뮬레이터</h1>
    <div class="subtitle">
        동일한 지진에서 내진 · 제진 · 면진 구조 비교
    </div>
</header>

<div class="panel">

    <div class="controls">

        진도 :
        <input type="range"
               id="intensity"
               min="1"
               max="10"
               value="5">

        <span id="value">5</span>

        <button onclick="startEarthquake()">
            지진 발생
        </button>

    </div>

    <div class="buildings">

        <div class="structure">

            <div class="building naejin"
                 id="naejin"></div>

            <div class="base"></div>

            <div class="name">내진 구조</div>

            <div class="status"
                 id="status1">
                 흔들림 큼
            </div>

        </div>

        <div class="structure">

            <div class="building jejin"
                 id="jejin"></div>

            <div class="base"></div>

            <div class="name">제진 구조</div>

            <div class="status"
                 id="status2">
                 흔들림 감소
            </div>

        </div>

        <div class="structure">

            <div class="building myeonjin"
                 id="myeonjin"></div>

            <div class="base"
                 id="isolationBase"></div>

            <div class="name">면진 구조</div>

            <div class="status"
                 id="status3">
                 건물 보호
            </div>

        </div>

    </div>

    <div class="twin-box">

        <h2>Digital Twin</h2>

        <p>
        실제 건물의 정보를 바탕으로 만든
        가상 건물 모델에 지진을 적용하여
        피해를 예측합니다.
        </p>

        <div class="flow">

            <div class="step">
                실제 건물
            </div>

            <div class="step">
                센서 데이터
            </div>

            <div class="step">
                디지털 트윈
            </div>

            <div class="step">
                지진 시뮬레이션
            </div>

            <div class="step">
                피해 예측
            </div>

        </div>

    </div>

</div>

<footer>
2026 Digital Twin Earthquake Simulation
</footer>

<script>

const slider =
document.getElementById("intensity");

const valueText =
document.getElementById("value");

slider.addEventListener("input",()=>{

    valueText.textContent =
    slider.value;

});

function startEarthquake(){

    const magnitude =
    Number(slider.value);

    const naejin =
    document.getElementById("naejin");

    const jejin =
    document.getElementById("jejin");

    const myeonjin =
    document.getElementById("myeonjin");

    const base =
    document.getElementById("isolationBase");

    let frame = 0;

    const timer =
    setInterval(()=>{

        frame++;

        const wave =
        Math.sin(frame*0.35);

        const naejinAngle =
        wave*magnitude*1.8;

        const jejinAngle =
        wave*magnitude*0.9;

        const myeonjinAngle =
        wave*magnitude*0.25;

        naejin.style.transform =
        `rotate(${naejinAngle}deg)`;

        jejin.style.transform =
        `rotate(${jejinAngle}deg)`;

        myeonjin.style.transform =
        `rotate(${myeonjinAngle}deg)`;

        base.style.transform =
        `translateX(${wave*magnitude*4}px)`;

        if(frame > 180){

            clearInterval(timer);

            naejin.style.transform =
            "rotate(0deg)";

            jejin.style.transform =
            "rotate(0deg)";

            myeonjin.style.transform =
            "rotate(0deg)";

            base.style.transform =
            "translateX(0px)";
        }

    },25);
}

</script>

</body>
</html>
```
