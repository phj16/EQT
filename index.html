```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Twin Earthquake Simulator</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#eef3f8;
}

header{
    background:#1e293b;
    color:white;
    text-align:center;
    padding:20px;
}

.controls{
    text-align:center;
    margin:20px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.container{
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
}

.model{
    text-align:center;
}

svg{
    overflow:visible;
}

/* 설명 패널 */

.panel{
    width:900px;
    max-width:90%;
    background:white;
    margin:40px auto;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

.flow{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.step{
    background:#dbeafe;
    padding:10px 15px;
    border-radius:8px;
}

</style>
</head>

<body>

<header>
<h1>🏢 Digital Twin Earthquake Simulator</h1>
<p>내진 · 제진 · 면진 구조 비교 실험</p>
</header>

<div class="controls">

진도

<input
type="range"
id="power"
min="1"
max="10"
value="5">

<span id="value">5</span>

<button onclick="earthquake()">
지진 발생
</button>

</div>

<div class="container">

<!-- ================== 내진 ================== -->

<div class="model">

<svg width="250" height="420">

<defs>

<linearGradient id="wood">
<stop offset="0%" stop-color="#c68d4c"/>
<stop offset="50%" stop-color="#e3bc84"/>
<stop offset="100%" stop-color="#c68d4c"/>
</linearGradient>

<linearGradient id="cardboard">
<stop offset="0%" stop-color="#c79652"/>
<stop offset="100%" stop-color="#e2bb7e"/>
</linearGradient>

<linearGradient id="stick">
<stop offset="0%" stop-color="#e8d2a4"/>
<stop offset="100%" stop-color="#f7e6bf"/>
</linearGradient>

<radialGradient id="steel">
<stop offset="0%" stop-color="#ffffff"/>
<stop offset="35%" stop-color="#d7dde3"/>
<stop offset="70%" stop-color="#838c96"/>
<stop offset="100%" stop-color="#49505a"/>
</radialGradient>

</defs>

<g id="naejin">

<!-- 기둥 -->

<rect x="50" y="40" width="10" height="280" fill="url(#wood)"/>
<rect x="190" y="40" width="10" height="280" fill="url(#wood)"/>

<!-- 층 -->

<rect x="40" y="90" width="170" height="12" fill="url(#cardboard)"/>
<rect x="40" y="145" width="170" height="12" fill="url(#cardboard)"/>
<rect x="40" y="200" width="170" height="12" fill="url(#cardboard)"/>
<rect x="40" y="255" width="170" height="12" fill="url(#cardboard)"/>
<rect x="40" y="310" width="170" height="12" fill="url(#cardboard)"/>

<!-- X 가새 -->

<line x1="50" y1="40" x2="190" y2="90"
stroke="url(#stick)" stroke-width="10"/>

<line x1="190" y1="40" x2="50" y2="90"
stroke="url(#stick)" stroke-width="10"/>

<line x1="50" y1="90" x2="190" y2="145"
stroke="url(#stick)" stroke-width="10"/>

<line x1="190" y1="90" x2="50" y2="145"
stroke="url(#stick)" stroke-width="10"/>

<line x1="50" y1="145" x2="190" y2="200"
stroke="url(#stick)" stroke-width="10"/>

<line x1="190" y1="145" x2="50" y2="200"
stroke="url(#stick)" stroke-width="10"/>

</g>

<rect x="20" y="350" width="210" height="20" fill="#444"/>

</svg>

<h3>내진 구조</h3>

</div>

<!-- ================== 제진 ================== -->

<div class="model">

<svg width="250" height="420">

<g id="jejin">

<rect x="50" y="40" width="10" height="280" fill="url(#wood)"/>
<rect x="190" y="40" width="10" height="280" fill="url(#wood)"/>

<rect x="40" y="90" width="170" height="12" fill="url(#cardboard)"/>
<rect x="40" y="145" width="170" height="12" fill="url(#cardboard)"/>
<rect x="40" y="200" width="170" height="12" fill="url(#cardboard)"/>
<rect x="40" y="255" width="170" height="12" fill="url(#cardboard)"/>
<rect x="40" y="310" width="170" height="12" fill="url(#cardboard)"/>

<line id="cable"
x1="125" y1="40"
x2="125" y2="95"
stroke="black"
stroke-width="2"/>

<circle id="weight"
cx="125"
cy="112"
r="18"
fill="url(#steel)"/>

</g>

<rect x="20" y="350" width="210" height="20" fill="#444"/>

</svg>

<h3>제진 구조</h3>

</div>

<!-- ================== 면진 ================== -->

<div class="model">

<svg width="250" height="420">

<g id="myeonjin">

<rect x="50" y="40" width="10" height="280" fill="url(#wood)"/>
<rect x="190" y="40" width="10" height="280" fill="url(#wood)"/>

<rect x="40" y="90" width="170" height="12" fill="url(#cardboard)"/>
<rect x="40" y="145" width="170" height="12" fill="url(#cardboard)"/>
<rect x="40" y="200" width="170" height="12" fill="url(#cardboard)"/>
<rect x="40" y="255" width="170" height="12" fill="url(#cardboard)"/>
<rect x="40" y="310" width="170" height="12" fill="url(#cardboard)"/>

</g>

<g id="isolator">

<circle cx="70" cy="340" r="12" fill="url(#steel)"/>
<circle cx="110" cy="340" r="12" fill="url(#steel)"/>
<circle cx="150" cy="340" r="12" fill="url(#steel)"/>
<circle cx="190" cy="340" r="12" fill="url(#steel)"/>

</g>

<rect x="20" y="360" width="210" height="20" fill="#444"/>

</svg>

<h3>면진 구조</h3>

</div>

</div>

<div class="panel">

<h2>🌐 Digital Twin</h2>

<div class="flow">
<div class="step">실제 건물</div>
<div class="step">센서 데이터</div>
<div class="step">디지털 트윈 모델</div>
<div class="step">지진 시뮬레이션</div>
<div class="step">피해 예측</div>
</div>

</div>

<script>

const slider =
document.getElementById("power");

slider.oninput = ()=>{
document.getElementById("value").textContent =
slider.value;
};

function earthquake(){

const power =
Number(slider.value);

const naejin =
document.getElementById("naejin");

const jejin =
document.getElementById("jejin");

const myeonjin =
document.getElementById("myeonjin");

const weight =
document.getElementById("weight");

const cable =
document.getElementById("cable");

const isolator =
document.getElementById("isolator");

let frame = 0;

const timer = setInterval(()=>{

frame++;

const wave =
Math.sin(frame * 0.22);

/* 내진 */

naejin.setAttribute(
"transform",
`rotate(${wave*power*2.5} 125 350)`
);

/* 제진 */

jejin.setAttribute(
"transform",
`rotate(${wave*power*1.2} 125 350)`
);

/* 제진추 */

const x =
125 - wave*power*7;

weight.setAttribute("cx",x);

cable.setAttribute("x2",x);

/* 면진 */

myeonjin.setAttribute(
"transform",
`rotate(${wave*power*0.3} 125 350)`
);

isolator.setAttribute(
"transform",
`translate(${wave*power*12},0)`
);

if(frame > 220){

clearInterval(timer);

naejin.removeAttribute("transform");
jejin.removeAttribute("transform");
myeonjin.removeAttribute("transform");
isolator.removeAttribute("transform");

weight.setAttribute("cx",125);
cable.setAttribute("x2",125);
}

},25);

}

</script>

</body>
</html>
```
