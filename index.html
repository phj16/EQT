```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디지털 트윈 내진·제진·면진 시뮬레이터</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eef3f8;
    text-align:center;
}

header{
    background:#1e293b;
    color:white;
    padding:20px;
}

.controls{
    margin:20px;
}

.city{
    display:flex;
    justify-content:center;
    gap:120px;
    margin-top:50px;
}

.model{
    width:180px;
}

.building{
    width:100px;
    height:220px;
    background:#60a5fa;
    margin:auto;
    position:relative;
    transform-origin:bottom center;
}

.floor{
    position:absolute;
    left:0;
    width:100%;
    height:2px;
    background:#ffffff88;
}

.floor:nth-child(1){top:40px;}
.floor:nth-child(2){top:80px;}
.floor:nth-child(3){top:120px;}
.floor:nth-child(4){top:160px;}
.floor:nth-child(5){top:200px;}

.label{
    margin-top:15px;
    font-weight:bold;
}

.ground{
    width:140px;
    height:20px;
    background:#444;
    margin:auto;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

input{
    width:250px;
}

.info{
    max-width:1000px;
    margin:auto;
    margin-top:40px;
    background:white;
    padding:20px;
    border-radius:10px;
}

/* 내진 X 트러스 */

.truss1,
.truss2{
    position:absolute;
    width:140px;
    height:4px;
    background:white;
    top:110px;
    left:-20px;
}

.truss1{
    transform:rotate(60deg);
}

.truss2{
    transform:rotate(-60deg);
}

/* 제진 추 */

.damper{
    width:25px;
    height:25px;
    background:#ef4444;
    border-radius:50%;
    position:absolute;
    top:-40px;
    left:37px;
}

/* 면진 구슬 */

.isolator{
    display:flex;
    justify-content:center;
    gap:8px;
    margin:auto;
    width:100px;
    height:25px;
}

.ball{
    width:18px;
    height:18px;
    border-radius:50%;
    background:#f59e0b;
}

</style>
</head>
<body>

<header>
<h1>🏢 Digital Twin Earthquake Simulator</h1>
<p>동일한 지진에서 내진 · 제진 · 면진 구조 비교</p>
</header>

<div class="controls">

진도 :
<input type="range"
       id="intensity"
       min="1"
       max="10"
       value="5">

<span id="value">5</span>

<button onclick="quake()">
지진 발생
</button>

</div>

<div class="city">

<!-- 내진 -->

<div class="model">

<div class="building" id="naejin">

<div class="floor"></div>
<div class="floor"></div>
<div class="floor"></div>
<div class="floor"></div>
<div class="floor"></div>

<div class="truss1"></div>
<div class="truss2"></div>

</div>

<div class="ground"></div>

<div class="label">
내진 구조 (X자 트러스)
</div>

</div>

<div class="model">

<div class="building" id="jejin">

<div class="damper" id="damper"></div>

<div class="floor"></div>
<div class="floor"></div>
<div class="floor"></div>
<div class="floor"></div>
<div class="floor"></div>

</div>

<div class="ground"></div>

<div class="label">
제진 구조 (TMD 추)
</div>

</div>

<div class="floor"></div>
<div class="floor"></div>
<div class="floor"></div>
<div class="floor"></div>
<div class="floor"></div>

</div>

<div class="ball"></div>
<div class="ball"></div>
<div class="ball"></div>
</div>

<div class="ground"></div>

<div class="label">
면진 구조 (구슬 받침)
</div>

</div>

<div class="info">

<h2>디지털 트윈</h2>

<p>
실제 건물을 가상 공간에 복제한 뒤
동일한 지진파를 적용하여
건물의 반응을 분석한다.
</p>

<p>
내진 : 구조를 강화하여 버틴다.<br>
제진 : 무게추가 반대로 움직여 진동을 줄인다.<br>
면진 : 건물과 지반을 분리하여 흔들림 전달을 차단한다.
</p>

<script>

const slider =
document.getElementById("intensity");

slider.oninput = () =>
document.getElementById("value").innerText =
slider.value;

function quake(){

const power =
Number(slider.value);

const naejin =
document.getElementById("naejin");

const jejin =
document.getElementById("jejin");

const myeonjin =
document.getElementById("myeonjin");

const damper =
document.getElementById("damper");

const isolator =
document.getElementById("isolator");

let t = 0;

const timer = setInterval(()=>{

t++;

const wave =
Math.sin(t*0.3);

naejin.style.transform =
`rotate(${wave*power*1.2}deg)`;

jejin.style.transform =
`rotate(${wave*power*0.7}deg)`;

damper.style.transform =
`translateX(${-wave*power*4}px)`;

myeonjin.style.transform =
`rotate(${wave*power*0.2}deg)`;

isolator.style.transform =
`translateX(${wave*power*5}px)`;

if(t>180){

clearInterval(timer);

naejin.style.transform="rotate(0deg)";
jejin.style.transform="rotate(0deg)";
myeonjin.style.transform="rotate(0deg)";
damper.style.transform="translateX(0)";
isolator.style.transform="translateX(0)";
}

},25);

}

</script>

</body>
</html>
