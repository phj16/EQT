<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Digital Twin Earthquake Lab</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#eef2f7;
    font-family:Arial,sans-serif;
}

header{
    background:#1e293b;
    color:white;
    text-align:center;
    padding:20px;
}

.controls{
    text-align:center;
    padding:20px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.container{
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
    margin-top:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

svg{
    overflow:visible;
}

.title{
    text-align:center;
    margin-top:10px;
    font-weight:bold;
}

.result{
    text-align:center;
    margin-top:8px;
    color:#2563eb;
    font-weight:bold;
}

.panel{
    width:1000px;
    max-width:95%;
    background:white;
    margin:40px auto;
    border-radius:12px;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

.flow{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin-top:15px;
}

.step{
    background:#dbeafe;
    padding:10px 15px;
    border-radius:8px;
}

.graph{
    margin-top:30px;
}

.bar{
    height:30px;
    margin:10px 0;
    color:white;
    display:flex;
    align-items:center;
    padding-left:10px;
    border-radius:5px;
}

.naejinBar{
    width:100%;
    background:#ef4444;
}

.jejinBar{
    width:70%;
    background:#f59e0b;
}

.myeonjinBar{
    width:18%;
    background:#10b981;
}

</style>
</head>

<body>

<header>

<h1>🏢 Digital Twin Earthquake Laboratory</h1>

<p>
실제 제작한 내진 · 제진 · 면진 모형의 디지털 트윈
</p>

</header>

<div class="controls">

진도 :

<input
type="range"
id="power"
min="1"
max="10"
value="5">

<span id="value">5</span>

<button id="startBtn">
지진 발생
</button>

</div>

<div class="container">

<!-- 내진 -->

<div class="card">

<svg width="240" height="420">

<defs>

<linearGradient id="wood">

<stop offset="0%" stop-color="#c48b48"/>
<stop offset="50%" stop-color="#e6c28d"/>
<stop offset="100%" stop-color="#c48b48"/>

</linearGradient>

<radialGradient id="steel">

<stop offset="0%" stop-color="#ffffff"/>
<stop offset="40%" stop-color="#d3d9df"/>
<stop offset="80%" stop-color="#7f8791"/>
<stop offset="100%" stop-color="#49505a"/>

</radialGradient>

</defs>

<g id="naejin">

<!-- 기둥 -->

<rect x="60" y="40" width="8" height="300" fill="url(#wood)"/>
<rect x="172" y="40" width="8" height="300" fill="url(#wood)"/>

<rect x="40" y="170" width="160" height="8" fill="#caa56b"/>
<rect x="40" y="40" width="160" height="8" fill="#caa56b"/>

<rect x="40" y="340" width="160" height="8" fill="#caa56b"/>

<!-- 위층 X -->

<line x1="60" y1="48"
      x2="180" y2="170"
      stroke="#ead4a6"
      stroke-width="8"/>

<line x1="180" y1="48"
      x2="60" y2="170"
      stroke="#ead4a6"
      stroke-width="8"/>

<!-- 아래층 X -->

<line x1="60" y1="170"
      x2="180" y2="340"
      stroke="#ead4a6"
      stroke-width="8"/>

<line x1="180" y1="170"
      x2="60" y2="340"
      stroke="#ead4a6"
      stroke-width="8"/>

</g>

</svg>

<div class="title">내진 구조</div>
<div class="result">물 유출량 28.2g</div>

</div>

<!-- 제진 -->

<div class="card">

<svg width="240" height="420">

<g id="jejin">

<rect x="60" y="40" width="8" height="300" fill="url(#wood)"/>
<rect x="172" y="40" width="8" height="300" fill="url(#wood)"/>

<rect x="40" y="170" width="160" height="8" fill="#caa56b"/>
<rect x="40" y="40" width="160" height="8" fill="#caa56b"/>
<rect x="40" y="340" width="160" height="8" fill="#caa56b"/>

<line id="rope"
      x1="120"
      y1="48"
      x2="120"
      y2="110"
      stroke="#999"
      stroke-width="2"/>

<circle id="weight"
        cx="120"
        cy="125"
        r="18"
        fill="url(#steel)"/>

</g>

</svg>

<div class="title">제진 구조</div>
<div class="result">물 유출량 19.7g</div>

</div>

<!-- 면진 -->

<div class="card">

<svg width="240" height="420">

<g id="myeonjin">

<rect x="60" y="40" width="8" height="300" fill="url(#wood)"/>
<rect x="172" y="40" width="8" height="300" fill="url(#wood)"/>

<rect x="40" y="170" width="160" height="8" fill="#caa56b"/>
<rect x="40" y="40" width="160" height="8" fill="#caa56b"/>
<rect x="40" y="300" width="160" height="8" fill="#caa56b"/>

</g>

<g id="isolator">

<circle cx="70" cy="325" r="12" fill="url(#steel)"/>
<circle cx="110" cy="325" r="12" fill="url(#steel)"/>
<circle cx="150" cy="325" r="12" fill="url(#steel)"/>
<circle cx="190" cy="325" r="12" fill="url(#steel)"/>

<line x1="70" y1="325" x2="190" y2="325"
stroke="#d4b000"
stroke-width="3"/>

<line x1="130" y1="295" x2="130" y2="355"
stroke="#d4b000"
stroke-width="3"/>

</g>

</svg>

<div class="title">면진 구조</div>
<div class="result">물 유출량 5.0g</div>

</div>

</div>

<div class="panel">

<h2>🌐 Digital Twin 분석</h2>

<div class="flow">

<div class="step">실제 모형</div>
<div class="step">센서 데이터</div>
<div class="step">디지털 트윈</div>
<div class="step">지진 시뮬레이션</div>
<div class="step">피해 예측</div>

</div>

<div class="graph">

<h3>실험 결과 비교</h3>

<div class="bar naejinBar">
내진 28.2g
</div>

<div class="bar jejinBar">
제진 19.7g
</div>

<div class="bar myeonjinBar">
면진 5.0g
</div>

</div>

</div>

<script>

/* 다음 단계에서 애니메이션 추가 */

const slider =
document.getElementById("power");

const value =
document.getElementById("value");

value.textContent = slider.value;

slider.addEventListener("input",()=>{
    value.textContent = slider.value;
});

const startBtn =
document.getElementById("startBtn");

const naejin =
document.getElementById("naejin");

const jejin =
document.getElementById("jejin");

const myeonjin =
document.getElementById("myeonjin");

const rope =
document.getElementById("rope");

const weight =
document.getElementById("weight");

const isolator =
document.getElementById("isolator");

/* 결과 표시 영역 생성 */

const resultPanel =
document.createElement("div");

resultPanel.style.marginTop="20px";
resultPanel.style.fontSize="18px";
resultPanel.style.fontWeight="bold";
resultPanel.style.textAlign="center";

document.querySelector(".panel")
.appendChild(resultPanel);

let running = false;

startBtn.addEventListener("click",()=>{

    if(running) return;

    running = true;

    simulateEarthquake();

});

function simulateEarthquake(){

    let frame = 0;

    const intensity =
    Number(slider.value);

    const duration = 1000;

    let spillN = 0;
    let spillJ = 0;
    let spillM = 0;

    const timer =
    setInterval(()=>{

        frame++;

        /* 실제 실험 2Hz */

        const t = frame / 60;

        const quake =
        Math.sin(t * Math.PI * 4);

        /* 내진 */

        const nAngle =
        quake * intensity * 3.2;

        naejin.setAttribute(
        "transform",
        `rotate(${nAngle} 120 340)`
        );

        /* 제진 */

        const jAngle =
        quake * intensity * 2.0;

        jejin.setAttribute(
        "transform",
        `rotate(${jAngle} 120 340)`
        );

        /* 제진추 */

        const pendulum =
        Math.sin(
            t * Math.PI * 3.5
        ) * intensity * 8;

        weight.setAttribute(
        "cx",
        120 - pendulum
        );

        rope.setAttribute(
        "x2",
        120 - pendulum
        );

        /* 면진 */

        const mAngle =
        quake * intensity * 0.7;

        myeonjin.setAttribute(
        "transform",
        `rotate(${mAngle} 120 300)`
        );

        const isoMove =
        quake * intensity * 12;

        isolator.setAttribute(
        "transform",
        `translate(${isoMove},0)`
        );

        /* 유출량 계산 */

        spillN +=
        Math.abs(nAngle)*0.018;

        spillJ +=
        Math.abs(jAngle)*0.013;

        spillM +=
        Math.abs(mAngle)*0.005;

        resultPanel.innerHTML =

        `
        <div>
        현재 유출량
        </div>

        <br>

        내진 :
        ${spillN.toFixed(1)} g

        <br>

        제진 :
        ${spillJ.toFixed(1)} g

        <br>

        면진 :
        ${spillM.toFixed(1)} g
        `;

        if(frame > duration){

            clearInterval(timer);

            finishSimulation();

        }

    },16);

}

function finishSimulation(){

    naejin.removeAttribute("transform");
    jejin.removeAttribute("transform");
    myeonjin.removeAttribute("transform");

    isolator.removeAttribute("transform");

    weight.setAttribute("cx",120);

    rope.setAttribute("x2",120);

    resultPanel.innerHTML =

    `
    <h2>
    실험 종료
    </h2>

    <br>

    <b>실제 측정 결과</b>

    <br><br>

    내진 : 28.2 g

    <br>

    제진 : 19.7 g

    <br>

    면진 : 5.0 g

    <br><br>

    면진 구조가
    가장 뛰어난 성능을 보였습니다.
    `;

    running = false;
}
